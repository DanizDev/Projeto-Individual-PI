<script>
 const canvas = document.getElementById('space-bg');
const pincel = canvas.getContext('2d');

const QUANTIDADE_ESTRELAS = 800;
const listaEstrelas = [];

function ajustarTamanho() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', ajustarTamanho);
ajustarTamanho();

function criarEstrela() {
  return {
    x:          (Math.random() - 0.5) * canvas.width  * 2,
    y:          (Math.random() - 0.5) * canvas.height * 2,
    profundidade:         Math.random() * canvas.width,
    profundidadeAnterior: 0
  };
}

for (let i = 0; i < QUANTIDADE_ESTRELAS; i++) {
  const estrela = criarEstrela();
  estrela.profundidadeAnterior = estrela.profundidade;
  listaEstrelas.push(estrela);
}

function animar() {
  pincel.fillStyle = 'rgba(0, 0, 0, 0.25)';
  pincel.fillRect(0, 0, canvas.width, canvas.height);

  const centroX = canvas.width  / 2;
  const centroY = canvas.height / 2;

  for (let i = 0; i < QUANTIDADE_ESTRELAS; i++) {
    const estrela = listaEstrelas[i];

    estrela.profundidadeAnterior = estrela.profundidade;
    estrela.profundidade -= 4;

    if (estrela.profundidade <= 0) {
      Object.assign(estrela, criarEstrela());
      estrela.profundidadeAnterior = estrela.profundidade;
      continue;
    }

    const telaPosAtualX = (estrela.x / estrela.profundidade)         * canvas.width  + centroX;
    const telaPosAtualY = (estrela.y / estrela.profundidade)         * canvas.height + centroY;
    const telaPosAnteriorX = (estrela.x / estrela.profundidadeAnterior) * canvas.width  + centroX;
    const telaPosAnteriorY = (estrela.y / estrela.profundidadeAnterior) * canvas.height + centroY;

    const proximidade = 1 - estrela.profundidade / canvas.width;

    pincel.beginPath();
    pincel.moveTo(telaPosAnteriorX, telaPosAnteriorY);
    pincel.lineTo(telaPosAtualX,    telaPosAtualY);
    pincel.strokeStyle = `rgba(${Math.floor(proximidade * 255)}, ${Math.floor(proximidade * 217 + 40)}, 255, ${proximidade * 0.9 + 0.1})`;
    pincel.lineWidth   = Math.max(0.4, proximidade * 3.5);
    pincel.stroke();
  }

  requestAnimationFrame(animar);
}

animar();
</script>
<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
